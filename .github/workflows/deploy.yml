name: CI/CD – Innovatech Chile

# ─────────────────────────────────────────────────────────────────
# Disparador: solo la rama "deploy"
# Cada push a esta rama ejecuta el pipeline completo:
#   Build → Push a Docker Hub → Deploy automático en EC2
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - deploy

env:
  # Imagen names en Docker Hub
  IMAGE_BACK_DESPACHOS: ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos
  IMAGE_BACK_VENTAS:    ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas
  IMAGE_FRONT_DESPACHO: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build y Push de las tres imágenes a Docker Hub
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout código fuente
        uses: actions/checkout@v4

      # 2. Configurar QEMU y Buildx para builds eficientes y multi-arch
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login a Docker Hub usando secrets del repositorio
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend Despachos ──────────────────────────────────
      - name: Build y Push – back-despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot
          file: ./back-Despachos_SpringBoot/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACK_DESPACHOS }}:latest
            ${{ env.IMAGE_BACK_DESPACHOS }}:${{ github.sha }}
          # Cache de capas entre builds para acelerar compilaciones
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend Ventas ─────────────────────────────────────
      - name: Build y Push – back-ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot
          file: ./back-Ventas_SpringBoot/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACK_VENTAS }}:latest
            ${{ env.IMAGE_BACK_VENTAS }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend Despacho ──────────────────────────────────
      - name: Build y Push – front-despacho
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./front_despacho/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONT_DESPACHO }}:latest
            ${{ env.IMAGE_FRONT_DESPACHO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy automático en la instancia EC2
  # Se ejecuta solo si el job anterior fue exitoso
  # ─────────────────────────────────────────────────────────────
  deploy-to-ec2:
    name: 🚀 Deploy en AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push   # Espera que las imágenes estén publicadas

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      # Copiar docker-compose.yml y .env a la instancia EC2 via SSH
      - name: Copiar archivos de despliegue a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          source:      "docker-compose.yml,.env.example"
          target:      "/home/${{ secrets.EC2_USER }}/innovatech"

      # Conectar a EC2 via SSH y ejecutar el despliegue
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          # El script se ejecuta en la instancia EC2
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/innovatech

            echo "=== Autenticando en Docker Hub ==="
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "=== Creando archivo .env ==="
            cat > .env <<EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            DB_DESPACHOS_NAME=${{ secrets.DB_DESPACHOS_NAME }}
            DB_DESPACHOS_USER=${{ secrets.DB_DESPACHOS_USER }}
            DB_DESPACHOS_PASSWORD=${{ secrets.DB_DESPACHOS_PASSWORD }}
            DB_DESPACHOS_ROOT_PASSWORD=${{ secrets.DB_DESPACHOS_ROOT_PASSWORD }}
            DB_VENTAS_NAME=${{ secrets.DB_VENTAS_NAME }}
            DB_VENTAS_USER=${{ secrets.DB_VENTAS_USER }}
            DB_VENTAS_PASSWORD=${{ secrets.DB_VENTAS_PASSWORD }}
            DB_VENTAS_ROOT_PASSWORD=${{ secrets.DB_VENTAS_ROOT_PASSWORD }}
            EOF

            echo "=== Descargando imágenes actualizadas ==="
            docker compose pull

            echo "=== Deteniendo servicios anteriores ==="
            docker compose down --remove-orphans

            echo "=== Iniciando servicios actualizados ==="
            docker compose up -d

            echo "=== Limpiando imágenes antiguas ==="
            docker image prune -f

            echo "=== Estado final de los contenedores ==="
            docker compose ps

            echo "✅ Deploy completado exitosamente"
