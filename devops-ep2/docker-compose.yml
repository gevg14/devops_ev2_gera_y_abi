version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Innovatech Chile – Plataforma de Despachos y Ventas
# Arquitectura: Frontend público + Backends en subred privada
# ─────────────────────────────────────────────────────────────────

services:

  # ── Base de datos Despachos ────────────────────────────────────
  db-despachos:
    image: mysql:8.0
    container_name: db-despachos
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_DESPACHOS_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DESPACHOS_NAME}
      MYSQL_USER: ${DB_DESPACHOS_USER}
      MYSQL_PASSWORD: ${DB_DESPACHOS_PASSWORD}
    volumes:
      # Persistencia de datos: los datos sobreviven al reinicio del contenedor
      - vol-db-despachos:/var/lib/mysql
    networks:
      - net-privada
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Base de datos Ventas ───────────────────────────────────────
  db-ventas:
    image: mysql:8.0
    container_name: db-ventas
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_VENTAS_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_VENTAS_NAME}
      MYSQL_USER: ${DB_VENTAS_USER}
      MYSQL_PASSWORD: ${DB_VENTAS_PASSWORD}
    volumes:
      - vol-db-ventas:/var/lib/mysql
    networks:
      - net-privada
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Despachos (Spring Boot) ───────────────────────────
  back-despachos:
    image: ${DOCKERHUB_USERNAME}/back-despachos:latest
    container_name: back-despachos
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-despachos:3306/${DB_DESPACHOS_NAME}?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${DB_DESPACHOS_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_DESPACHOS_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - net-privada   # Solo en red privada: no expuesto a Internet
    depends_on:
      db-despachos:
        condition: service_healthy
    # Puerto 8081 solo accesible dentro de la red privada Docker
    # No se publica hacia el host (sin "ports:")

  # ── Backend Ventas (Spring Boot) ──────────────────────────────
  back-ventas:
    image: ${DOCKERHUB_USERNAME}/back-ventas:latest
    container_name: back-ventas
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-ventas:3306/${DB_VENTAS_NAME}?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${DB_VENTAS_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_VENTAS_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - net-privada   # Solo en red privada
    depends_on:
      db-ventas:
        condition: service_healthy

  # ── Frontend Despacho (React/Vite + Nginx) ─────────────────────
  front-despacho:
    image: ${DOCKERHUB_USERNAME}/front-despacho:latest
    container_name: front-despacho
    restart: unless-stopped
    ports:
      # ÚNICO servicio expuesto a Internet (puerto 80 del host EC2)
      - "80:80"
    networks:
      - net-publica    # Accesible desde Internet
      - net-privada    # Para comunicarse con los backends
    depends_on:
      - back-despachos
      - back-ventas

# ── Redes ─────────────────────────────────────────────────────────
networks:
  net-publica:
    # Red para tráfico externo (solo el frontend la usa)
    driver: bridge
    name: innovatech-publica

  net-privada:
    # Red interna: backends y bases de datos aislados de Internet
    driver: bridge
    internal: true
    name: innovatech-privada

# ── Volúmenes (persistencia de datos) ────────────────────────────
volumes:
  vol-db-despachos:
    name: innovatech-db-despachos
  vol-db-ventas:
    name: innovatech-db-ventas
